# React Doctor — finds security, performance, correctness, accessibility,
# bundle-size, and architecture issues in React codebases.
#
# Docs: https://www.react.doctor/ci
# Source: https://github.com/millionco/react-doctor

name: React Doctor

on:
  # Scans the PR's changed files and posts a sticky summary comment listing only the new issues introduced relative to the merge base of the target branch.
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  # Scans `main` on every push to track the health-score trend and catch regressions that slipped past PR review.
  push:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: write
  issues: write
  statuses: write

# Cancels any in-flight scan for the same PR (or branch, on push) the moment a new commit arrives, so reviewers only ever see the latest run.
concurrency:
  group: react-doctor-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  react-doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Don't leave the GITHUB_TOKEN in .git/config for the third-party
          # react-doctor step that runs after this checkout.
          persist-credentials: false
          # Full history so react-doctor can resolve the PR merge base and only
          # report newly introduced findings (not pre-existing ones).
          fetch-depth: 0

      # Pinned to the immutable commit SHA that v2 (v2.1.0) points to, so a
      # retargeted tag or upstream compromise can't change what runs here.
      - uses: millionco/react-doctor@547e1e4ecdb70315d81a91ec3605701d58616ee2 # v2
        # Run advisory: React Doctor reports findings on every PR — a sticky
        # summary comment, inline review comments, and a commit status with the
        # health score — but never fails the check, so it won't red-X a
        # teammate's PR on day one. NOTE: react-doctor's `blocking` defaults to
        # "error" (it fails on new error-severity findings), so we set it to
        # "none" explicitly below to keep this advisory. When your team trusts
        # the signal, graduate the gate: change `blocking` to "warning" (fail on
        # any finding) or "error" (fail on new error-severity findings).
        # Full reference: https://www.react.doctor/ci
        with:
          blocking: none # Gate level: "none" (advisory) | "warning" | "error". Default is "error".
        # Other available options (defaults shown):
        #   scope: full              # On PRs, scan the whole project instead of just changed files
        #   comment: false           # Disable the sticky PR summary comment
        #   review-comments: false   # Disable inline review comments on changed lines
        #   commit-status: false     # Disable the commit status (score + counts, links to the run)
        #   version: "0.4.0"         # Pin to a specific react-doctor version instead of "latest"
        #   directory: apps/web      # Scan a sub-directory (default: ".")
        #   project: "web,admin"     # In a monorepo, scan specific workspace project(s)
